<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Hero With US Map Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow-x: hidden;
}

.video-section {
    position: relative;
    width: 100%;
    min-height: 78vh;
    overflow: hidden;
    background: #000;
    border: none;
}

.video-section iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    width: max(100vw, 177.78vh);
    height: max(78vh, 56.25vw);
    transform: translate(-50%, -50%);
    border: 0;
    z-index: 1;
    pointer-events: none;
}

.video-section::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 2;
    background: rgba(0, 0, 0, 0.56);
    pointer-events: none;
}

.hero-content {
    position: relative;
    z-index: 3;
    min-height: 78vh;
    width: 100%;
    display: grid;
    grid-template-columns: 0.85fr 1.15fr;
    align-items: center;
    gap: 40px;
    padding: 50px 7%;
}

.hero-text {
    color: #fff;
    max-width: 560px;
}

.hero-text h1 {
    /* font-family: Cambria, Georgia, serif; */
      font-family: "Oswald", sans-serif;
  

    
	font-size: clamp(26px,3.8vw,50px);
	font-weight: 700;
	color: #fff;
	line-height: 1.08;
	text-transform: uppercase;
	letter-spacing: 1px;
	margin-bottom: 18px;
	text-shadow: 0 2px 14px rgba(0,0,0,.7);

}

.hero-text p {

 font-family: "Montserrat", sans-serif;


	font-size: 16px;
	color: rgba(255,255,255,.80);
	line-height: 1.65;
	margin-bottom: 0;

}

.hero-btn {
    display: none;
}

.map-card {
    width: 100%;
    max-width: 820px;
    margin-left: auto;
}

#ikr_svg {
    width: 100%;
    height: auto;
    display: block;
}

#ikr_svg path {
    fill: rgba(255, 255, 255, 0.12) !important;
    stroke: rgba(255, 255, 255, 0.42) !important;
    stroke-width: 1.8 !important;
    transition: fill 0.25s ease, stroke 0.25s ease, filter 0.25s ease;
    cursor: default;
}

#ikr_svg path.active-location {
	fill: black !important;
	stroke: rgba(250, 255, 250, 0.95) !important;
	cursor: pointer;
}

#ikr_svg path.active-location:hover {
     fill: rgba(83, 80, 80, 0.12) !important;
    stroke: #fff !important;
    filter: drop-shadow(0 0 8px rgba(76, 175, 80, 0.7));
}

#mapTooltip {
    position: fixed;
    z-index: 9999;
    background: rgba(255, 255, 255, 0.95);
    color: #000000;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -130%);
    transition: opacity 0.15s ease;
    white-space: nowrap;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    text-transform: uppercase;
}

#mapTooltip.show {
    opacity: 1;
}

.content-section {
    background: #0a0a0a;
    color: #fff;
    padding: 80px 7%;
    min-height: 500px;
}

/* Tablet */
@media (max-width: 992px) {
    .video-section,
    .hero-content {
        min-height: auto;
    }

    .hero-content {
        grid-template-columns: 1fr;
        text-align: center;
        justify-items: center;
        padding: 55px 5% 45px;
        gap: 35px;
    }

    .hero-text {
        max-width: 720px;
        margin: 0 auto;
    }

    .hero-text h1 {
        font-size: clamp(38px, 7vw, 60px);
    }

    .map-card {
        max-width: 720px;
        margin: 0 auto;
    }
}

/* Mobile */
@media (max-width: 600px) {
    .video-section {
        min-height: auto;
    }

    .video-section iframe {
        width: 177.78vh;
        height: 100vh;
        min-width: 100vw;
        min-height: 100%;
    }

    .hero-content {
        min-height: auto;
        grid-template-columns: 1fr;
        padding: 38px 16px 32px;
        gap: 28px;
    }

    .hero-text h1 {
        font-size: 34px;
        margin-bottom: 12px;
    }

    .hero-text p {
        font-size: 16px;
        line-height: 1.5;
    }

    .map-card {
        width: 100%;
        max-width: 100%;
    }

    #ikr_svg {
        max-height: 360px;
    }
}

/* Small Mobile */
@media (max-width: 420px) {
    .hero-content {
        padding: 30px 16px 28px;
        gap: 26px;
    }

    .hero-text h1 {
        font-size: 30px;
    }

    #ikr_svg {
        max-height: 320px;
    }
}
#mapStateCta {
    margin-top: 14px;
    text-align: center;
    color: rgba(2, 2, 2, 0.65);
    font-size: 15px;
    letter-spacing: 1px;
    transition: 0.25s ease;
}

#mapStateCta.active {
    color: #fff;
    font-weight: 700;
    text-transform: uppercase;
}
 </style>

        </div>

      </div>
    </section>

  

    <script>
      const stateLinks = {
        MO: {
          name: "Missouri",
          url: "https://ozarksunitedcountry.com/listing?listingSource=all%20listings&condition=%7B%22location%22%3A%7B%22none%22%3A%5B%22missouri%22%5D%7D%7D&uiConfig=%7B%7D&zoom=5&page=1",
        },
        AR: {
          name: "Arkansas",
          url: "https://ozarksunitedcountry.com/listing?listingSource=all%20listings&condition=%7B%22location%22%3A%7B%22mapPath%22%3A%221LWddc_2kAuth%22%7D%7D&uiConfig=%7B%7D&zoom=8&page=1",
        },
      };

      /**************************************************
       * CHANGE ONLY THIS LINE to add the new video on background
       **************************************************/

      const CLIENT_YOUTUBE_URL =
        "https://youtu.be/4dDt5OxKR2M?si=F7hAl8uC2KcknUiP";

      /**************************************************
       * DO NOT EDIT ANYTHING BELOW
       **************************************************/
      function getYoutubeID(url) {
        url = url.trim();

        // youtu.be
        let match = url.match(/youtu\.be\/([^?&]+)/);
        if (match) return match[1];

        // watch?v=
        match = url.match(/[?&]v=([^&]+)/);
        if (match) return match[1];

        // embed/
        match = url.match(/embed\/([^?&]+)/);
        if (match) return match[1];

        return "";
      }

      const videoID = getYoutubeID(CLIENT_YOUTUBE_URL);

      document.getElementById("youtubeVideo").src =
        `https://www.youtube.com/embed/${videoID}?autoplay=1&mute=1&controls=0&loop=1&playlist=${videoID}&playsinline=1&rel=0&modestbranding=1&disablekb=1&iv_load_policy=3&fs=0&start=0&end=99999&enablejsapi=1`;
      const tooltip = document.getElementById("mapTooltip");

     const mapStateCta = document.getElementById("mapStateCta");

Object.entries(stateLinks).forEach(([id, data]) => {

    const state = document.getElementById(id);
    if (!state) return;

    state.classList.add("active-location");
    state.style.cursor = "pointer";

    state.addEventListener("mouseenter", () => {
        tooltip.innerHTML = data.name;
        tooltip.classList.add("show");

        mapStateCta.innerHTML = `${data.name} — View Listings →`;
        mapStateCta.classList.add("active");
    });

    state.addEventListener("mousemove", (e) => {
        tooltip.style.left = e.clientX + "px";
        tooltip.style.top = e.clientY + "px";
    });

    state.addEventListener("mouseleave", () => {
        tooltip.classList.remove("show");

        mapStateCta.innerHTML = "Click a green highlighted state to browse listings";
        mapStateCta.classList.remove("active");
    });

    state.addEventListener("click", () => {
        window.open(data.url, "_blank");
    });
